services:
  thesis_ros:
    build:
      context: ..
      dockerfile: docker/Dockerfile.humble
      args:
        USERNAME: ros
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    image: go2_thesis:humble
    container_name: go2_thesis_humble
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    stdin_open: true
    tty: true
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_NET_IFACE=${ROS_NET_IFACE:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ..:/workspaces/go2_thesis
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspaces/go2_thesis
    command: bash
    gpus: all